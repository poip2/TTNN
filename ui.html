<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试助手</title>
<style>
/*
 * Solarized Light theme
 * base3  #fdf6e3  page background
 * base2  #eee8d5  container / card background
 * base00 #657b83  body text
 * base01 #586e75  headings / emphasis
 * base1  #93a1a1  secondary / muted text
 * blue   #268bd2  primary / info
 * green  #859900  success
 * orange #cb4b16  warning
 * red    #dc322f  danger / error
 */

:root {
  --bg-page:      #fdf6e3;
  --bg-card:      #eee8d5;
  --text-body:    #657b83;
  --text-head:    #586e75;
  --text-muted:   #93a1a1;
  --border:       #eee8d5;
  --shadow:       rgba(88, 110, 117, .10);

  --accent-primary: #268bd2;
  --accent-success: #859900;
  --accent-warning: #cb4b16;
  --accent-danger:  #dc322f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-body);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  padding: 10px 18px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 3px var(--shadow);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  user-select: none;
  -webkit-app-region: drag;
}

.pulse {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--accent-success);
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(133,153,0,.5); }
  50%       { box-shadow: 0 0 0 5px rgba(133,153,0,0); }
}

header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: .3px;
  color: var(--text-head);
}

/* ── Three-column layout ── */
.panels {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 1px;
  background: var(--border);
}

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-page);
  overflow: hidden;
  min-width: 0;
}

.panel.assistant { flex: 1.5; }

/* ── Panel header ── */
.panel-header {
  padding: 10px 14px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
}

.ph-icon { font-size: 17px; line-height: 1; }

.ph-title {
  font-size: 13px;
  font-weight: 600;
  flex: 1;
  color: var(--text-head);
}

.ph-badge {
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 20px;
  background: var(--bg-page);
  color: var(--text-muted);
  border: 1px solid var(--border);
  transition: all .25s;
}

.ph-badge.ok  { background: #f2f5dc; color: var(--accent-success); border-color: #c9d180; }
.ph-badge.err { background: #fce9e9; color: var(--accent-danger);  border-color: #f0b0ae; }
.ph-badge.run { background: #e5f0fa; color: var(--accent-primary); border-color: #a8ceed; }

/* ── Live streaming box ── */
.live-box {
  padding: 12px 14px;
  max-height: 38%;
  overflow-y: auto;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  line-height: 1.75;
  flex-shrink: 0;
  transition: background .2s;
  word-break: break-word;
}

.live-box::-webkit-scrollbar { width: 3px; }
.live-box::-webkit-scrollbar-thumb { background: #c8bfaa; border-radius: 2px; }

.live-box.active-interviewee { background: #f4f7e5; }
.live-box.active-interviewer { background: #fdf2ea; }
.live-box.active-assistant   { background: #eaf3fc; }

.text-interim { color: var(--text-muted); font-style: italic; }
.text-live    { color: var(--text-head); }

.cursor {
  display: inline-block;
  width: 2px; height: .95em;
  vertical-align: text-bottom;
  margin-left: 2px;
  border-radius: 1px;
  animation: blink 1s step-end infinite;
}

.panel.interviewee .cursor { background: var(--accent-success); }
.panel.interviewer .cursor { background: var(--accent-warning); }
.panel.assistant   .cursor { background: var(--accent-primary); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.live-placeholder {
  color: var(--text-muted);
  font-size: 13px;
  font-style: italic;
}

/* ── History ── */
.history-box {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-box::-webkit-scrollbar { width: 3px; }
.history-box::-webkit-scrollbar-thumb { background: #c8bfaa; border-radius: 2px; }

.entry {
  padding: 9px 11px;
  background: var(--bg-card);
  border-radius: 7px;
  font-size: 13px;
  line-height: 1.65;
  border-left: 3px solid var(--accent-success);
  color: var(--text-body);
  box-shadow: 0 1px 3px var(--shadow);
  animation: slideIn .25s ease;
  word-break: break-word;
}

.panel.interviewer .entry { border-left-color: var(--accent-warning); }
.panel.assistant   .entry { border-left-color: var(--accent-primary); white-space: pre-wrap; }

.entry-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 5px;
}

@keyframes slideIn {
  from { opacity:0; transform: translateY(4px); }
  to   { opacity:1; transform: translateY(0); }
}

.hint {
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  padding: 20px 0;
  font-style: italic;
}
</style>
</head>
<body>

<header>
  <div class="pulse"></div>
  <h1>面试助手</h1>
</header>

<div class="panels">

  <!-- 面试者 -->
  <div class="panel interviewee">
    <div class="panel-header">
      <span class="ph-icon">🎤</span>
      <span class="ph-title">面试者</span>
      <span class="ph-badge" id="badge-mic">等待</span>
    </div>
    <div class="live-box" id="live-interviewee">
      <span class="live-placeholder">等待发言…</span>
    </div>
    <div class="history-box" id="hist-interviewee">
      <div class="hint">暂无记录</div>
    </div>
  </div>

  <!-- 面试官 -->
  <div class="panel interviewer">
    <div class="panel-header">
      <span class="ph-icon">🔊</span>
      <span class="ph-title">面试官</span>
      <span class="ph-badge" id="badge-speaker">等待</span>
    </div>
    <div class="live-box" id="live-interviewer">
      <span class="live-placeholder">等待发言…</span>
    </div>
    <div class="history-box" id="hist-interviewer">
      <div class="hint">暂无记录</div>
    </div>
  </div>

  <!-- AI 建议 -->
  <div class="panel assistant">
    <div class="panel-header">
      <span class="ph-icon">🤖</span>
      <span class="ph-title">AI 建议</span>
      <span class="ph-badge" id="badge-assistant">待机</span>
    </div>
    <div class="live-box" id="live-assistant">
      <span class="live-placeholder">等待面试官发言后自动生成建议…</span>
    </div>
    <div class="history-box" id="hist-assistant">
      <div class="hint">暂无建议</div>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────
const aiBuf = { text: '' };

// ── Helpers ───────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}

function ts() {
  return new Date().toLocaleTimeString('zh', { hour12:false });
}

function clearHint(el) {
  const h = el.querySelector('.hint, .live-placeholder');
  if (h) h.remove();
}

// ── Live box ──────────────────────────────────────────────────
function setLive(role, text, interim) {
  const box = document.getElementById('live-' + role);
  clearHint(box);
  box.className = 'live-box active-' + role;
  const cls = interim ? 'text-interim' : 'text-live';
  box.innerHTML = `<span class="${cls}">${esc(text)}</span><span class="cursor"></span>`;
  box.scrollTop = box.scrollHeight;
}

function appendLive(role, chunk) {
  const box = document.getElementById('live-' + role);
  clearHint(box);
  if (!box.classList.contains('active-' + role)) {
    box.className = 'live-box active-' + role;
    box.innerHTML = '';
  }
  // find or create text span
  let sp = box.querySelector('span.text-live');
  if (!sp) {
    box.innerHTML = `<span class="text-live"></span><span class="cursor"></span>`;
    sp = box.querySelector('span.text-live');
  }
  sp.innerHTML += esc(chunk);
  box.scrollTop = box.scrollHeight;
}

function clearLive(role) {
  const box = document.getElementById('live-' + role);
  box.innerHTML = '';
  box.className = 'live-box';
}

// ── History ───────────────────────────────────────────────────
function addHistory(role, text) {
  const hist = document.getElementById('hist-' + role);
  clearHint(hist);
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `${esc(text)}<div class="entry-time">${ts()}</div>`;
  hist.appendChild(div);
  hist.scrollTop = hist.scrollHeight;
}

// ── Badge ─────────────────────────────────────────────────────
function setBadge(id, text, cls) {
  const el = document.getElementById('badge-' + id);
  if (!el) return;
  el.textContent = text;
  el.className = 'ph-badge' + (cls ? ' ' + cls : '');
}

// ── Main event handler ────────────────────────────────────────
function handleEvent(event) {
  switch (event.type) {

    case 'asr_update':
      setLive(event.role, event.text, true);
      break;

    case 'asr_final':
      addHistory(event.role, event.text);
      clearLive(event.role);
      break;

    case 'asr_status': {
      const ch = event.channel === 'mic' ? 'mic' : 'speaker';
      if (event.status === 'connected')    setBadge(ch, '已连接', 'ok');
      else if (event.status === 'error')   setBadge(ch, '错误',   'err');
      else if (event.status === 'disconnected') setBadge(ch, '断开', '');
      else                                 setBadge(ch, event.status, '');
      break;
    }

    case 'suggestion_start':
      aiBuf.text = '';
      clearLive('assistant');
      setBadge('assistant', '生成中…', 'run');
      break;

    case 'suggestion_chunk':
      aiBuf.text += event.text;
      appendLive('assistant', event.text);
      break;

    case 'suggestion_end':
      addHistory('assistant', event.text || aiBuf.text);
      aiBuf.text = '';
      clearLive('assistant');
      setBadge('assistant', '待机', '');
      break;
  }
}
</script>
</body>
</html>
